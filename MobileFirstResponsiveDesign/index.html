<!DOCTYPE html>
<html>

<head>

  <title>Mobile First Responsive Design</title>

  <!-- Viewport Meta Tag -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1">

  <style>

    /* MOBILE FIRST DESIGN */

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
    }

    /* Navigation Bar */

    .navbar {
      background-color: #333;
      padding: 15px;
      text-align: center;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      display: block;
      padding: 10px;
    }

    /* Main Container */

    .container {
      padding: 15px;
    }

    /* Cards */

    .card {
      background-color: white;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0px 2px 5px gray;
    }

    /* Images */

    img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
    }

    /* Tablet/Desktop Design */

    @media screen and (min-width: 768px) {

      .navbar {
        display: flex;
        justify-content: center;
      }

      .navbar a {
        display: inline-block;
        margin: 0 15px;
      }

      .container {
        display: flex;
        gap: 20px;
      }

      .card {
        width: 50%;
      }

    }

  </style>

</head>

<body>

  <!-- Navigation -->

  <div class="navbar">

    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>

  </div>

  <!-- Main Content -->

  <div class="container">

    <div class="card">

      <h2>Mobile First Design</h2>

      <img src="https://via.placeholder.com/400"
           alt="Image">

      <p>
        This webpage is designed using the
        mobile-first responsive approach.
      </p>

    </div>

    <div class="card">

      <h2>Responsive Layout</h2>

      <img src="https://via.placeholder.com/400"
           alt="Image">

      <p>
        Layout automatically adjusts according
        to screen size using media queries.
      </p>

    </div>

  </div>

</body>

</html>
