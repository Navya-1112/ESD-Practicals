<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>jQuery Demo</title>

    <!-- jQuery CDN -->

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        body {
            font-family: Arial;
            padding: 20px;
        }

        #box {

            width: 200px;
            height: 200px;

            background-color: skyblue;

            margin-top: 20px;

            text-align: center;
            line-height: 200px;
        }

        button {
            padding: 10px;
            margin: 5px;
        }

    </style>
</head>

<body>

    <h1 id="title">
        jQuery Demonstration
    </h1>

    <button id="changeBtn">
        Change Text
    </button>

    <button id="hideBtn">
        Hide Box
    </button>

    <button id="showBtn">
        Show Box
    </button>

    <button id="animateBtn">
        Animate Box
    </button>

    <div id="box">
        BOX
    </div>

    <script src="script.js"></script>

</body>

</html>
