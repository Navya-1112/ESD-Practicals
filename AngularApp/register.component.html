<h2>User Registration</h2>

<form>

  <label>Username:</label>

  <input type="text"
         [(ngModel)]="username"
         name="username">

  <br><br>

  <label>Password:</label>

  <input type="password"
         [(ngModel)]="password"
         name="password">

  <br><br>

  <button type="button"
          (click)="registerUser()">

    Register

  </button>

</form>
