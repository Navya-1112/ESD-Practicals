<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Styling Demo</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>CSS Styling Demonstration</h1>

    <!-- FLEXBOX -->
    <h2>Flexbox Layout</h2>

    <div class="flex-container">

        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>

    </div>

    <!-- GRID -->
    <h2>Grid Layout</h2>

    <div class="grid-container">

        <div class="grid-box">A</div>
        <div class="grid-box">B</div>
        <div class="grid-box">C</div>
        <div class="grid-box">D</div>

    </div>

    <!-- TRANSITION -->
    <h2>Transition Effect</h2>

    <button class="btn">
        Hover Me
    </button>

    <!-- ANIMATION -->
    <h2>Animation</h2>

    <div class="circle"></div>

</body>

</html>
